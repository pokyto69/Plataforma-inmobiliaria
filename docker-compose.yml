services:
  app:
    build:
      context: .
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGINS: https://${DOMAIN:-localhost},http://localhost:8080
      PARTNER_API_KEYS: ${PARTNER_API_KEYS:-demo-partner-key}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      USER_PROPERTIES_PATH: /app/data/userProperties.json
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - app_data:/app/data

  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  app_data:
  caddy_data:
  caddy_config:
